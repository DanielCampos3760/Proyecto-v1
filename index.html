<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abraham OS - Cloud Control</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="login-container" class="auth-box" style="display: none;">
        <h2>🧠 Abraham OS</h2>
        <div class="input-group">
            <input type="text" id="auth-username" placeholder="Usuario">
            <input type="password" id="auth-password" placeholder="Contraseña">
            <button onclick="loginUser()">Iniciar Sesión</button>
            <button class="secondary-btn" onclick="registerUser()">Crear Cuenta</button>
        </div>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <header>
            <div class="header-top">
                <h1>Abraham OS <span>AI Panel</span></h1>
                <button class="logout-btn" onclick="logoutUser()">🚪 Salir</button>
            </div>
            <p id="welcome-message" class="subtitle"></p>
            <nav class="tabs">
                <button class="tab-btn active" onclick="openTab('profiles-tab')">🕒 Historial</button>
                <button class="tab-btn" onclick="openTab('ai-tab')">🧠 IA</button>
                <button class="tab-btn" onclick="openTab('hardware-tab')">🖥️ Hardware</button>
            </nav>
        </header>

        <main>
            <div id="profiles-tab" class="tab-content active">
                <div class="chat-history-layout" style="display: flex; gap: 20px;">
                    <div id="notes-display" style="width: 30%;">Cargando...</div>
                    <div class="main-detail" style="width: 70%;">
                        <div id="welcome-history">👈 Selecciona un tema</div>
                        <div id="profile-detail-view" style="display: none;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h2 id="detail-title"></h2>
                                <div>
                                    <button onclick="closeProfileDetail()" style="width: auto; background: gray;">Cerrar</button>
                                    <button id="detail-delete-btn" class="delete-btn" style="width: auto; background: red;">🗑️</button>
                                </div>
                            </div>
                            <div id="detail-content" class="markdown-body"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="ai-tab" class="tab-content">
                <section>
                    <h2>Consultar a Abraham</h2>
                    <div class="input-group">
                        <input type="text" id="ai-command" placeholder="¿Cómo optimizo mi PC?">
                        <button onclick="processAICommand()">Analizar</button>
                    </div>
                    <div id="ai-status" class="status-box">Listo.</div>
                </section>
            </div>

            <div id="hardware-tab" class="tab-content">
                <section>
                    <h2>Hardware Detectado</h2>
                    <input type="file" id="hardware-file-input" style="display: none;" accept=".json" onchange="handleFileUpload(event)">
                    <button class="sync-btn" onclick="document.getElementById('hardware-file-input').click()">📂 Subir system_context.json</button>
                    <div id="hardware-display" class="data-grid"></div>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
